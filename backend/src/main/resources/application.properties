# ── PostgreSQL (production example) ────────────────────────────────
# spring.datasource.url=jdbc:postgresql://localhost:5432/happydentdb
# spring.datasource.driver-class-name=org.postgresql.Driver
# spring.datasource.username=postgres
# spring.datasource.password=your_password
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ── Admin Credentials ──────────────────────────────────────────────
# Generate BCrypt hash: new BCryptPasswordEncoder().encode("YourPassword")
# Default: admin@happydentclinic.in / Admin@123
app.admin.email=admin@happydentclinic.in
app.admin.password=$2a$10$lMC.N.Rqxer5BBVohoMXUOX1gKyMRqI1CGmtpYvpY/mn584QpODvy

# ── JWT ────────────────────────────────────────────────────────────
# Secret must be at least 32 chars. Change in production.
app.jwt.secret=${APP_JWT_SECRET:HappyDent-JWT-Secret-Key-Change-In-Production-2024}
app.jwt.expiration=86400000

# ── File Storage ───────────────────────────────────────────────────
app.upload.dir=uploads

# ── Email Notifications ────────────────────────────────────────────
# Set enabled=true and configure SMTP to receive email alerts on new bookings.
app.notification.email.enabled=false
app.notification.email.to=admin@happydentclinic.in
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── WhatsApp Notifications (CallMeBot) ─────────────────────────────
# Activate at https://www.callmebot.com/blog/free-api-whatsapp-messages/
app.notification.whatsapp.enabled=false
app.notification.whatsapp.phone=
app.notification.whatsapp.apikey=

# ── Multipart File Upload ──────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Logging ────────────────────────────────────────────────────────
logging.level.com.happydent=INFO
