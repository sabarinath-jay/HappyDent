server.port=${PORT:8080}

# ── H2 Database (dev) ─────────────────────────────────────────────
# Data persists to ./data/happydentdb between restarts.
# To switch to MySQL/PostgreSQL: comment out H2 lines, uncomment prod lines below.
spring.datasource.url=jdbc:h2:file:./data/happydentdb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── MySQL (production example) ─────────────────────────────────────
# spring.datasource.url=jdbc:mysql://localhost:3306/happydentdb?useSSL=false&serverTimezone=UTC
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
